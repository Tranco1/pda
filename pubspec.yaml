name: vpos_dashboard
description: Vendor POS Dashboard App
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  # HTTP & API
  http: ^1.2.0
  # Secure token storage (replaces SharedPreferences for secrets)
  flutter_secure_storage: ^9.0.0
  # State management
  provider: ^6.1.1
  # UI
  google_fonts: ^6.1.0
  shimmer: ^3.0.0
  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
